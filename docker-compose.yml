services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: kubemini
      POSTGRES_USER: kubemini
      POSTGRES_PASSWORD: kubemini
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kubemini"]
      interval: 10s
      timeout: 5s
      retries: 5

  kubemini:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/kubemini
      SPRING_DATASOURCE_USERNAME: kubemini
      SPRING_DATASOURCE_PASSWORD: kubemini
      KUBEMINI_RUNTIME_MODE: simulated
      KUBEMINI_JWT_SECRET: compose-development-secret-32-bytes-minimum
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  prometheus:
    image: prom/prometheus:v2.55.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./ops/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.3.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./ops/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./ops/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"

volumes:
  postgres-data:
