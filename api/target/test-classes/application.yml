spring:
  datasource:
    url: jdbc:h2:mem:kubemini;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
kubemini:
  runtime:
    mode: simulated
  security:
    jwt-secret: test-development-secret-must-be-32-bytes
